version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: smartrecruit_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartrecruit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartrecruit_pass}
      POSTGRES_DB: ${POSTGRES_DB:-smartrecruit_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartrecruit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartrecruit_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartrecruit}:${POSTGRES_PASSWORD:-smartrecruit_pass}@db:5432/${POSTGRES_DB:-smartrecruit_db}
      SECRET_KEY: ${SECRET_KEY:-changethisinproduction}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartrecruit_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
